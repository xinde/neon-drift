<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gyro Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<script src="littlejs.js"></script>
<script src="sensor.js"></script>
<script>
// ============ Gyro Test (LittleJS + sensor.js) ============
let sensor = null;
let ballX, ballY, ballVX, ballVY;
let ballRadius = 0.3;
const FRICTION = 0.94;
const ACCEL = 15;
const MAX_SPEED = 6;
const BOUNDARY = 8;

let statusText = 'TAP TO START';
let statusColor = rgb(1, 1, 0);
let started = false;

cameraScale = 50;

function initTest() {
  sensor = new SensorInput();
  ballX = 8;
  ballY = 5;
  ballVX = 0;
  ballVY = 0;
  cameraPos = vec2(8, 5);
}

function setStatus(text, col) {
  statusText = text;
  statusColor = col || rgb(1, 1, 0);
}

function gameInit() {
  initTest();
  showSplashScreen = false;
  canvasMaxSize = vec2(9999, 9999);
  canvasPixelated = false;
  canvas.addEventListener('pointerdown', onPointer, { once: false });
}

async function onPointer() {
  if (started) return;
  started = true;
  setStatus('STARTING...', rgb(0.5, 0.5, 0.5));

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm === 'granted') {
        sensor.start();
        setStatus('ACTIVE', rgb(0.2, 1, 0.4));
      } else {
        setStatus('DENIED', rgb(1, 0.2, 0.2));
      }
    } catch (e) {
      setStatus('DENIED', rgb(1, 0.2, 0.2));
    }
    return;
  }

  sensor.start();
  if (sensor.enabled) {
    setStatus('ACTIVE', rgb(0.2, 1, 0.4));
  } else if (!SensorInput.isAvailable()) {
    setStatus('NO GYRO (DESKTOP)', rgb(1, 0.5, 0));
  } else {
    setStatus('NO HTTPS', rgb(1, 0.4, 0));
  }
}

function gameUpdate() {
  let gx = 0, gy = 0;
  if (started && sensor && sensor.enabled) {
    const t = sensor.getTiltVector();
    gx = t.x;
    gy = t.y;
  }

  ballVX += gx * ACCEL * timeDelta;
  ballVY += gy * ACCEL * timeDelta;
  ballVX *= FRICTION;
  ballVY *= FRICTION;

  const spd = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
  if (spd > MAX_SPEED) {
    ballVX = ballVX / spd * MAX_SPEED;
    ballVY = ballVY / spd * MAX_SPEED;
  }

  ballX += ballVX * timeDelta;
  ballY -= ballVY * timeDelta;

  if (ballX < ballRadius) { ballX = ballRadius; ballVX *= -0.5; }
  if (ballX > BOUNDARY - ballRadius) { ballX = BOUNDARY - ballRadius; ballVX *= -0.5; }
  if (ballY < ballRadius) { ballY = ballRadius; ballVY *= -0.5; }
  if (ballY > 10 - ballRadius) { ballY = 10 - ballRadius; ballVY *= -0.5; }

  cameraPos.x += (ballX - cameraPos.x) * 3 * timeDelta;
  cameraPos.y += (ballY - cameraPos.y) * 3 * timeDelta;
}

function gameRender() {
  drawRect(vec2(8, 5), vec2(BOUNDARY, 10), rgb(0.04, 0.04, 0.07));

  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let x = 0; x <= BOUNDARY; x++) {
    drawLine(vec2(x, 0), vec2(x, 10), rgb(0, 1, 1), 0.02);
  }
  for (let y = 0; y <= 10; y++) {
    drawLine(vec2(0, y), vec2(BOUNDARY, y), rgb(0, 1, 1), 0.02);
  }
  ctx.restore();

  drawRect(vec2(BOUNDARY / 2, 5), vec2(BOUNDARY, 10), rgb(0, 0.3, 0.5), 0, 0);

  // Always draw ball and arrow
  const speed = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
  const glowScale = 1.0 + speed * 0.3;
  drawCircle(vec2(ballX, ballY), ballRadius * 1.8 * glowScale, rgb(0, 0.8, 1, 0.2));
  drawCircle(vec2(ballX, ballY), ballRadius * 1.3 * glowScale, rgb(0, 1, 1, 0.3));
  drawCircle(vec2(ballX, ballY), ballRadius, rgb(0.9, 1, 1));
  drawCircle(vec2(ballX, ballY), ballRadius * 0.5, rgb(1, 1, 1, 0.9));

  if (speed > 0.1) {
    const arrowLen = ballRadius * 2 + speed * 0.5;
    const angle = Math.atan2(-ballVY, ballVX);
    const ax = ballX + Math.cos(angle) * arrowLen;
    const ay = ballY - Math.sin(angle) * arrowLen;
    ctx.save();
    ctx.globalAlpha = Math.min(0.8, speed * 0.2);
    ctx.strokeStyle = '#00FFFF';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ballX, ballY);
    ctx.lineTo(ax, ay);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - Math.cos(angle - 0.4) * 6, ay + Math.sin(angle - 0.4) * 6);
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - Math.cos(angle + 0.4) * 6, ay + Math.sin(angle + 0.4) * 6);
    ctx.stroke();
    ctx.restore();
  }

  // Splash screen overlay when not started
  if (!started) {
    ctx.save();
    ctx.globalAlpha = 0.85;
    drawRect(vec2(8, 5), vec2(BOUNDARY, 10), rgb(0.02, 0.02, 0.05));
    ctx.restore();

    drawTextScreen('GYRO TEST', vec2(canvas.width / 2, canvas.height / 2 - 80), 4, rgb(0, 1, 1));
    drawTextScreen('TAP ANYWHERE', vec2(canvas.width / 2, canvas.height / 2), 2, rgb(1, 1, 0));
    drawTextScreen('Tilt device = ball moves', vec2(canvas.width / 2, canvas.height / 2 + 40), 1.2, rgb(0.5, 0.5, 0.5));
  }
}

function gameRenderUI() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Status bar at very top
  drawTextScreen('[' + statusText + ']', vec2(cx, 36), 2.2, statusColor);

  // GYRO DATA panel - bottom left, always visible
  let gx = 0, gy = 0;
  if (started && sensor && sensor.enabled) {
    const t = sensor.getTiltVector();
    gx = t.x;
    gy = t.y;
  }
  const col = (started && sensor && sensor.enabled) ? rgb(0, 1, 1) : rgb(0.4, 0.4, 0.4);
  const lx = 16, ly = canvas.height - 20;

  // Background panel
  ctx.save();
  ctx.globalAlpha = 0.3;
  drawRect(vec2(lx + 60, ly - 65), vec2(140, 75), rgb(0.1, 0.1, 0.2));
  ctx.restore();

  drawTextScreen('GYRO DATA', vec2(lx + 8, ly - 70), 1.0, col);
  drawTextScreen('gx: ' + gx.toFixed(3), vec2(lx + 8, ly - 48), 1.2, col);
  drawTextScreen('gy: ' + gy.toFixed(3), vec2(lx + 8, ly - 28), 1.2, col);
  drawTextScreen('vx: ' + ballVX.toFixed(2), vec2(lx + 8, ly - 8), 1.2, col);
  drawTextScreen('vy: ' + ballVY.toFixed(2), vec2(lx + 120, ly - 48), 1.2, col);

  // SPEED - bottom right
  const spd = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
  drawTextScreen('SPEED', vec2(canvas.width - 16, canvas.height - 40), 1.0, col);
  drawTextScreen(spd.toFixed(2), vec2(canvas.width - 16, canvas.height - 18), 1.6, col);

  // Desktop hint when not started
  if (!started) {
    drawTextScreen('(Use mobile + HTTPS to test gyro)', vec2(cx, 64), 0.9, rgb(0.3, 0.3, 0.3));
  }
}

canvasMaxSize = vec2(9999, 9999);
canvasPixelated = false;
showSplashScreen = false;
cameraScale = 50;
engineInit(gameInit, gameUpdate, null, gameRender, gameRenderUI);
</script>
</body>
</html>
