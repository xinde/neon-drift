<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gyro Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<script src="littlejs.js"></script>
<script src="sensor.js"></script>
<script>
// ============ 最小化陀螺仪测试 (LittleJS + sensor.js) ============
let sensor = null;
let ballX, ballY, ballVX, ballVY;
let ballRadius = 0.3;
const FRICTION = 0.94;
const ACCEL = 15;
const MAX_SPEED = 6;
const BOUNDARY = 8;

let statusText = 'TAP TO START';
let statusColor = rgb(1, 1, 0);
let started = false;

// 调试信息
let debugLines = [];

// 世界坐标：宽 16，高 10，相机居中
cameraScale = 50;

function initTest() {
  sensor = new SensorInput();
  ballX = 8;
  ballY = 5;
  ballVX = 0;
  ballVY = 0;
  cameraPos = vec2(8, 5);
}

function setStatus(text, col) {
  statusText = text;
  statusColor = col || rgb(1, 1, 0);
}

function gameInit() {
  initTest();
  showSplashScreen = false;
  canvasMaxSize = vec2(9999, 9999);
  canvasPixelated = false;
  canvas.addEventListener('pointerdown', onPointer, { once: false });
}

async function onPointer() {
  if (started) return;
  started = true;
  setStatus('STARTING...', rgb(0.5, 0.5, 0.5));

  // iOS 13+: 必须先申请权限，再启动传感器
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm === 'granted') {
        sensor.start();
        setStatus('ACTIVE', rgb(0.2, 1, 0.4));
      } else {
        setStatus('DENIED', rgb(1, 0.2, 0.2));
      }
    } catch (e) {
      setStatus('DENIED', rgb(1, 0.2, 0.2));
    }
    return;
  }

  // 非 iOS: 直接启动
  sensor.start();
  if (sensor.enabled) {
    setStatus('ACTIVE', rgb(0.2, 1, 0.4));
  } else if (!SensorInput.isAvailable()) {
    setStatus('NO GYRO (DESKTOP)', rgb(1, 0.5, 0));
  } else {
    setStatus('NO HTTPS', rgb(1, 0.4, 0));
  }
}

function gameUpdate() {
  if (!started) return;

  // 读取陀螺仪
  let gx = 0, gy = 0;
  if (sensor && sensor.enabled) {
    const t = sensor.getTiltVector();
    gx = t.x;
    gy = t.y;
  }

  // 施加加速度
  ballVX += gx * ACCEL * timeDelta;
  ballVY += gy * ACCEL * timeDelta;

  // 摩擦
  ballVX *= FRICTION;
  ballVY *= FRICTION;

  // 速度限制
  const spd = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
  if (spd > MAX_SPEED) {
    ballVX = ballVX / spd * MAX_SPEED;
    ballVY = ballVY / spd * MAX_SPEED;
  }

  // 移动
  ballX += ballVX * timeDelta;
  ballY -= ballVY * timeDelta; // Y轴反向

  // 边界反弹
  if (ballX < ballRadius) { ballX = ballRadius; ballVX *= -0.5; }
  if (ballX > BOUNDARY - ballRadius) { ballX = BOUNDARY - ballRadius; ballVX *= -0.5; }
  if (ballY < ballRadius) { ballY = ballRadius; ballVY *= -0.5; }
  if (ballY > 10 - ballRadius) { ballY = 10 - ballRadius; ballVY *= -0.5; }

  // 相机跟随
  cameraPos.x += (ballX - cameraPos.x) * 3 * timeDelta;
  cameraPos.y += (ballY - cameraPos.y) * 3 * timeDelta;
}

function gameRender() {
  // 背景
  drawRect(vec2(8, 5), vec2(BOUNDARY, 10), rgb(0.04, 0.04, 0.07));

  // 网格
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let x = 0; x <= BOUNDARY; x++) {
    drawLine(vec2(x, 0), vec2(x, 10), rgb(0, 1, 1), 0.02);
  }
  for (let y = 0; y <= 10; y++) {
    drawLine(vec2(0, y), vec2(BOUNDARY, y), rgb(0, 1, 1), 0.02);
  }
  ctx.restore();

  // 边界框
  drawRect(vec2(BOUNDARY / 2, 5), vec2(BOUNDARY, 10), rgb(0, 0.3, 0.5), 0, 0);

  if (!started) {
    drawTextScreen('GYRO TEST', vec2(canvas.width / 2, canvas.height * 0.35), 48, rgb(0, 1, 1));
    drawTextScreen('TAP ANYWHERE TO START', vec2(canvas.width / 2, canvas.height * 0.5), 24, rgb(0.5, 0.5, 0.5));
    drawTextScreen('Tilt device to move ball', vec2(canvas.width / 2, canvas.height * 0.58), 18, rgb(0.3, 0.3, 0.3));
    return;
  }

  // 球体外晕
  drawCircle(vec2(ballX, ballY), ballRadius * 1.8, rgb(0, 0.8, 1, 0.2));
  drawCircle(vec2(ballX, ballY), ballRadius * 1.3, rgb(0, 1, 1, 0.3));

  // 球体核心
  drawCircle(vec2(ballX, ballY), ballRadius, rgb(0.9, 1, 1));
  drawCircle(vec2(ballX, ballY), ballRadius * 0.5, rgb(1, 1, 1, 0.9));
}

function gameRenderUI() {
  // 状态标签
  drawTextScreen(statusText, vec2(canvas.width / 2, 30), 20, statusColor);

  // 传感器值显示（只要 sensor 存在就显示）
  if (started && sensor) {
    let gx = 0, gy = 0;
    if (sensor.enabled) {
      const t = sensor.getTiltVector();
      gx = t.x;
      gy = t.y;
    }
    const enabled = sensor.enabled;
    const lines = [
      `Sensor: ${enabled ? 'ON' : 'OFF'}`,
      `gx:${gx.toFixed(3)}  gy:${gy.toFixed(3)}`,
      `vx:${ballVX.toFixed(2)}  vy:${ballVY.toFixed(2)}`,
    ];
    ctx.save();
    ctx.font = '14px monospace';
    ctx.fillStyle = enabled ? '#00FFFF' : '#888888';
    ctx.textAlign = 'center';
    const baseY = canvas.height - 60;
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], canvas.width / 2, baseY + i * 20);
    }
    ctx.restore();
  }

  // 未启动时的提示
  if (!started) {
    drawTextScreen(
      'Desktop: No gyro - use a mobile device with HTTPS',
      vec2(canvas.width / 2, canvas.height - 30),
      12, rgb(0.3, 0.3, 0.3)
    );
  }
}

// 启动引擎
canvasMaxSize = vec2(9999, 9999);
canvasPixelated = false;
showSplashScreen = false;
cameraScale = 50;
engineInit(gameInit, gameUpdate, null, gameRender, gameRenderUI);
</script>
</body>
</html>
