<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gyro Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<script src="littlejs.js"></script>
<script src="sensor.js"></script>
<script>
// ============ 最小化陀螺仪测试 (LittleJS + sensor.js) ============
let sensor = null;
let ballX, ballY, ballVX, ballVY;
let ballRadius = 0.3;
const FRICTION = 0.94;
const ACCEL = 15;
const MAX_SPEED = 6;
const BOUNDARY = 8;

let statusText = 'TAP TO START';
let statusColor = rgb(1, 1, 0);
let started = false;

cameraScale = 50;

function initTest() {
  sensor = new SensorInput();
  ballX = 8;
  ballY = 5;
  ballVX = 0;
  ballVY = 0;
  cameraPos = vec2(8, 5);
}

function setStatus(text, col) {
  statusText = text;
  statusColor = col || rgb(1, 1, 0);
}

function gameInit() {
  initTest();
  showSplashScreen = false;
  canvasMaxSize = vec2(9999, 9999);
  canvasPixelated = false;
  canvas.addEventListener('pointerdown', onPointer, { once: false });
}

async function onPointer() {
  if (started) return;
  started = true;
  setStatus('STARTING...', rgb(0.5, 0.5, 0.5));

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm === 'granted') {
        sensor.start();
        setStatus('ACTIVE', rgb(0.2, 1, 0.4));
      } else {
        setStatus('DENIED', rgb(1, 0.2, 0.2));
      }
    } catch (e) {
      setStatus('DENIED', rgb(1, 0.2, 0.2));
    }
    return;
  }

  sensor.start();
  if (sensor.enabled) {
    setStatus('ACTIVE', rgb(0.2, 1, 0.4));
  } else if (!SensorInput.isAvailable()) {
    setStatus('NO GYRO (DESKTOP)', rgb(1, 0.5, 0));
  } else {
    setStatus('NO HTTPS', rgb(1, 0.4, 0));
  }
}

function gameUpdate() {
  if (!started) return;

  let gx = 0, gy = 0;
  if (sensor && sensor.enabled) {
    const t = sensor.getTiltVector();
    gx = t.x;
    gy = t.y;
  }

  ballVX += gx * ACCEL * timeDelta;
  ballVY += gy * ACCEL * timeDelta;
  ballVX *= FRICTION;
  ballVY *= FRICTION;

  const spd = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
  if (spd > MAX_SPEED) {
    ballVX = ballVX / spd * MAX_SPEED;
    ballVY = ballVY / spd * MAX_SPEED;
  }

  ballX += ballVX * timeDelta;
  ballY -= ballVY * timeDelta;

  if (ballX < ballRadius) { ballX = ballRadius; ballVX *= -0.5; }
  if (ballX > BOUNDARY - ballRadius) { ballX = BOUNDARY - ballRadius; ballVX *= -0.5; }
  if (ballY < ballRadius) { ballY = ballRadius; ballVY *= -0.5; }
  if (ballY > 10 - ballRadius) { ballY = 10 - ballRadius; ballVY *= -0.5; }

  cameraPos.x += (ballX - cameraPos.x) * 3 * timeDelta;
  cameraPos.y += (ballY - cameraPos.y) * 3 * timeDelta;
}

function gameRender() {
  drawRect(vec2(8, 5), vec2(BOUNDARY, 10), rgb(0.04, 0.04, 0.07));

  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let x = 0; x <= BOUNDARY; x++) {
    drawLine(vec2(x, 0), vec2(x, 10), rgb(0, 1, 1), 0.02);
  }
  for (let y = 0; y <= 10; y++) {
    drawLine(vec2(0, y), vec2(BOUNDARY, y), rgb(0, 1, 1), 0.02);
  }
  ctx.restore();

  drawRect(vec2(BOUNDARY / 2, 5), vec2(BOUNDARY, 10), rgb(0, 0.3, 0.5), 0, 0);

  if (!started) {
    drawTextScreen('GYRO TEST', vec2(canvas.width / 2, canvas.height * 0.3), 5, rgb(0, 1, 1));
    drawTextScreen('TAP ANYWHERE TO START', vec2(canvas.width / 2, canvas.height * 0.5), 2, rgb(0.5, 0.5, 0.5));
    drawTextScreen('Tilt device to move ball', vec2(canvas.width / 2, canvas.height * 0.58), 1.2, rgb(0.3, 0.3, 0.3));
    return;
  }

  // 球体外晕 - 强度随速度变化
  const speed = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
  const glowScale = 1.0 + speed * 0.3;
  drawCircle(vec2(ballX, ballY), ballRadius * 1.8 * glowScale, rgb(0, 0.8, 1, 0.2));
  drawCircle(vec2(ballX, ballY), ballRadius * 1.3 * glowScale, rgb(0, 1, 1, 0.3));

  // 球体核心
  drawCircle(vec2(ballX, ballY), ballRadius, rgb(0.9, 1, 1));
  drawCircle(vec2(ballX, ballY), ballRadius * 0.5, rgb(1, 1, 1, 0.9));

  // 速度箭头
  if (speed > 0.1) {
    const arrowLen = ballRadius * 2 + speed * 0.5;
    const angle = Math.atan2(-ballVY, ballVX);
    const ax = ballX + Math.cos(angle) * arrowLen;
    const ay = ballY - Math.sin(angle) * arrowLen;
    ctx.save();
    ctx.globalAlpha = Math.min(0.8, speed * 0.2);
    ctx.strokeStyle = '#00FFFF';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ballX, ballY);
    ctx.lineTo(ax, ay);
    ctx.stroke();
    const headLen = 6;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - Math.cos(angle - 0.4) * headLen, ay + Math.sin(angle - 0.4) * headLen);
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - Math.cos(angle + 0.4) * headLen, ay + Math.sin(angle + 0.4) * headLen);
    ctx.stroke();
    ctx.restore();
  }
}

function gameRenderUI() {
  // 顶部状态标签 - 大字号，清晰可见
  drawTextScreen('[ ' + statusText + ' ]', vec2(canvas.width / 2, 40), 2.5, statusColor);

  // 左上角：传感器实时数值
  if (started && sensor) {
    let gx = 0, gy = 0;
    if (sensor.enabled) {
      const t = sensor.getTiltVector();
      gx = t.x;
      gy = t.y;
    }
    const enabled = sensor.enabled;
    const col = enabled ? rgb(0, 1, 1) : rgb(0.5, 0.5, 0.5);
    const x = 20, y0 = 70;
    drawTextScreen('=== GYRO DATA ===', vec2(x, y0), 1.0, col);
    drawTextScreen('Sensor: ' + (enabled ? 'ON' : 'OFF'), vec2(x, y0 + 22), 1.0, col);
    drawTextScreen('gx: ' + gx.toFixed(3), vec2(x, y0 + 44), 1.0, col);
    drawTextScreen('gy: ' + gy.toFixed(3), vec2(x, y0 + 66), 1.0, col);
    drawTextScreen('vx: ' + ballVX.toFixed(2), vec2(x, y0 + 88), 1.0, col);
    drawTextScreen('vy: ' + ballVY.toFixed(2), vec2(x, y0 + 110), 1.0, col);

    // 右上角：速度指示
    const spd = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
    drawTextScreen('SPEED', vec2(canvas.width - 20, 70), 1.0, col);
    drawTextScreen(spd.toFixed(2), vec2(canvas.width - 20, 92), 1.8, col);

    // 底部中间：提示
    if (enabled) {
      drawTextScreen('Tilt your device - ball follows!', vec2(canvas.width / 2, canvas.height - 30), 1.0, rgb(0.3, 0.3, 0.3));
    }
  }

  // 右下角
  drawTextScreen('Gyro Test v2', vec2(canvas.width - 20, canvas.height - 20), 0.8, rgb(0.2, 0.2, 0.2));
}

canvasMaxSize = vec2(9999, 9999);
canvasPixelated = false;
showSplashScreen = false;
cameraScale = 50;
engineInit(gameInit, gameUpdate, null, gameRender, gameRenderUI);
</script>
</body>
</html>
