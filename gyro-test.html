<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gyro Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<script src="littlejs.js"></script>
<script src="sensor.js"></script>
<script>
// ============ Gyro Test (LittleJS + sensor.js) ============
let sensor = null;
let ballX = 8, ballY = 5;
let ballVX = 0, ballVY = 0;
const ballRadius = 0.3;
const FRICTION = 0.94;
const ACCEL = 15;
const MAX_SPEED = 6;
const BOUNDARY = 8;

let statusText = 'TAP TO START';
let statusColor = rgb(1, 1, 0);
let started = false;

cameraScale = 50;

function gameInit() {
  sensor = new SensorInput();
  showSplashScreen = false;
  canvasMaxSize = vec2(9999, 9999);
  canvasPixelated = false;
  canvas.addEventListener('pointerdown', onPointer);
}

async function onPointer() {
  if (started) return;
  started = true;
  statusText = 'STARTING...';
  statusColor = rgb(0.6, 0.6, 0.6);

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm === 'granted') {
        sensor.start();
        statusText = 'ACTIVE';
        statusColor = rgb(0.2, 1, 0.4);
      } else {
        statusText = 'DENIED';
        statusColor = rgb(1, 0.2, 0.2);
      }
    } catch (e) {
      statusText = 'DENIED';
      statusColor = rgb(1, 0.2, 0.2);
    }
    return;
  }

  sensor.start();
  if (sensor.enabled) {
    statusText = 'ACTIVE';
    statusColor = rgb(0.2, 1, 0.4);
  } else if (!SensorInput.isAvailable()) {
    statusText = 'NO GYRO (DESKTOP)';
    statusColor = rgb(1, 0.6, 0);
  } else {
    statusText = 'NO HTTPS';
    statusColor = rgb(1, 0.4, 0);
  }
}

function gameUpdate() {
  let gx = 0, gy = 0;
  if (started && sensor && sensor.enabled) {
    const t = sensor.getTiltVector();
    gx = t.x;
    gy = t.y;
  }

  ballVX += gx * ACCEL * timeDelta;
  ballVY += gy * ACCEL * timeDelta;
  ballVX *= FRICTION;
  ballVY *= FRICTION;

  const spd = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
  if (spd > MAX_SPEED) {
    ballVX = ballVX / spd * MAX_SPEED;
    ballVY = ballVY / spd * MAX_SPEED;
  }

  ballX += ballVX * timeDelta;
  ballY -= ballVY * timeDelta;

  if (ballX < ballRadius) { ballX = ballRadius; ballVX *= -0.5; }
  if (ballX > BOUNDARY - ballRadius) { ballX = BOUNDARY - ballRadius; ballVX *= -0.5; }
  if (ballY < ballRadius) { ballY = ballRadius; ballVY *= -0.5; }
  if (ballY > 10 - ballRadius) { ballY = 10 - ballRadius; ballVY *= -0.5; }

  cameraPos.x += (ballX - cameraPos.x) * 3 * timeDelta;
  cameraPos.y += (ballY - cameraPos.y) * 3 * timeDelta;
}

function gameRender() {
  // Background
  drawRect(vec2(8, 5), vec2(BOUNDARY, 10), rgb(0.04, 0.04, 0.07));

  // Grid
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let x = 0; x <= BOUNDARY; x++)
    drawLine(vec2(x, 0), vec2(x, 10), rgb(0, 1, 1), 0.02);
  for (let y = 0; y <= 10; y++)
    drawLine(vec2(0, y), vec2(BOUNDARY, y), rgb(0, 1, 1), 0.02);
  ctx.restore();

  // Border
  drawRect(vec2(BOUNDARY / 2, 5), vec2(BOUNDARY, 10), rgb(0, 0.3, 0.5), 0, 0);

  // Ball glow - scales with speed
  const speed = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
  const glow = 1.0 + speed * 0.25;
  drawCircle(vec2(ballX, ballY), ballRadius * 2.0 * glow, rgb(0, 0.8, 1, 0.15));
  drawCircle(vec2(ballX, ballY), ballRadius * 1.4 * glow, rgb(0, 1, 1, 0.25));
  drawCircle(vec2(ballX, ballY), ballRadius, rgb(0.9, 1, 1));
  drawCircle(vec2(ballX, ballY), ballRadius * 0.5, rgb(1, 1, 1, 0.9));

  // Speed arrow
  if (speed > 0.05) {
    const angle = Math.atan2(-ballVY, ballVX);
    const arrowEndX = ballX + Math.cos(angle) * (ballRadius * 2 + speed * 0.6);
    const arrowEndY = ballY - Math.sin(angle) * (ballRadius * 2 + speed * 0.6);
    ctx.save();
    ctx.globalAlpha = Math.min(0.9, speed * 0.15);
    ctx.strokeStyle = '#00FFFF';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ballX, ballY);
    ctx.lineTo(arrowEndX, arrowEndY);
    ctx.stroke();
    const hLen = 6;
    ctx.beginPath();
    ctx.moveTo(arrowEndX, arrowEndY);
    ctx.lineTo(arrowEndX - Math.cos(angle - 0.4) * hLen, arrowEndY + Math.sin(angle - 0.4) * hLen);
    ctx.moveTo(arrowEndX, arrowEndY);
    ctx.lineTo(arrowEndX - Math.cos(angle + 0.4) * hLen, arrowEndY + Math.sin(angle + 0.4) * hLen);
    ctx.stroke();
    ctx.restore();
  }

  // Splash overlay
  if (!started) {
    ctx.save();
    ctx.globalAlpha = 0.7;
    drawRect(vec2(8, 5), vec2(BOUNDARY, 10), rgb(0.02, 0.02, 0.05));
    ctx.restore();
  }
}

function gameRenderUI() {
  const cx = canvas.width / 2;

  // Status text centered at top
  drawTextScreen('STATUS: ' + statusText, vec2(cx, 40), 2.5, statusColor);

  // Splash screen text centered
  if (!started) {
    drawTextScreen('GYRO TEST', vec2(cx, canvas.height / 2 - 60), 5, rgb(0, 1, 1));
    drawTextScreen('TAP ANYWHERE', vec2(cx, canvas.height / 2), 2.5, rgb(1, 1, 0));
    drawTextScreen('Tilt device to move ball', vec2(cx, canvas.height / 2 + 50), 1.2, rgb(0.5, 0.5, 0.5));
  }

  // Gyro data - centered below top status
  let gx = 0, gy = 0;
  if (started && sensor && sensor.enabled) {
    const t = sensor.getTiltVector();
    gx = t.x;
    gy = t.y;
  }
  const col = (started && sensor && sensor.enabled) ? rgb(0, 1, 1) : rgb(0.4, 0.4, 0.4);

  drawTextScreen('gx: ' + gx.toFixed(3) + '   gy: ' + gy.toFixed(3), vec2(cx, 75), 1.2, col);
  drawTextScreen('vx: ' + ballVX.toFixed(2) + '   vy: ' + ballVY.toFixed(2), vec2(cx, 95), 1.2, col);
  drawTextScreen('SPEED: ' + Math.sqrt(ballVX * ballVX + ballVY * ballVY).toFixed(2), vec2(cx, 115), 1.2, col);

  // Bottom hint
  drawTextScreen('(Mobile + HTTPS required for gyro)', vec2(cx, canvas.height - 20), 0.9, rgb(0.25, 0.25, 0.25));
}

canvasMaxSize = vec2(9999, 9999);
canvasPixelated = false;
showSplashScreen = false;
cameraScale = 50;
engineInit(gameInit, gameUpdate, null, gameRender, gameRenderUI);
</script>
</body>
</html>
